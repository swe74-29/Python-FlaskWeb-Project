<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PortScan — Network Port Scanner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:           #090d18;
      --surface:      #0d1525;
      --border:       rgba(0, 200, 230, 0.14);
      --border-soft:  rgba(0, 200, 230, 0.06);
      --accent:       #00d4ff;
      --accent-glow:  rgba(0, 212, 255, 0.12);
      --text:         #d8eaf5;
      --muted:        #405570;
      --danger:       #ff4d6a;
      --mono:         'Share Tech Mono', monospace;
      --sans:         'Inter', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ─── Nav ─── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 2rem;
      border-bottom: 1px solid var(--border-soft);
      position: relative;
      z-index: 10;
    }

    .nav-logo {
      font-family: var(--mono);
      font-size: 0.9rem;
      color: var(--accent);
      letter-spacing: 0.12em;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
    }

    .nav-pulse {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      animation: pulse-dot 1.8s ease-in-out infinite;
      flex-shrink: 0;
    }

    .nav-links {
      display: flex;
      gap: 1.75rem;
      list-style: none;
    }

    .nav-links a {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.18s;
    }

    .nav-links a:hover { color: var(--accent); }

    /* ─── Main layout ─── */
    main {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 2.5rem 1.5rem;
      position: relative;
      /* overflow: hidden removed — was blocking scroll on small viewports */
    }

    /* ─── Radar background (signature element) ─── */
    .radar-bg {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      user-select: none;
      overflow: hidden; /* clip radar here, not on main */
    }

    .radar {
      position: relative;
      width: 580px;
      height: 580px;
    }

    /* Concentric rings */
    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(0, 212, 255, 0.18);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .ring:nth-child(1) { width: 100px; height: 100px; }
    .ring:nth-child(2) { width: 210px; height: 210px; }
    .ring:nth-child(3) { width: 330px; height: 330px; }
    .ring:nth-child(4) { width: 460px; height: 460px; }
    .ring:nth-child(5) { width: 580px; height: 580px; opacity: 0.5; }

    /* Crosshair */
    .cross-h, .cross-v {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 212, 255, 0.1);
    }
    .cross-h { width: 580px; height: 1px; }
    .cross-v { width: 1px; height: 580px; }

    /* Rotating sweep using conic-gradient */
    .sweep {
      position: absolute;
      width: 580px;
      height: 580px;
      border-radius: 50%;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: conic-gradient(
        from 0deg,
        rgba(0, 212, 255, 0.22) 0deg,
        rgba(0, 212, 255, 0.08) 25deg,
        transparent 50deg
      );
      animation: sweep-rotate 5s linear infinite;
    }

    /* Center dot */
    .radar-center {
      position: absolute;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    /* Blip dots — each given absolute position from radar center */
    .blip {
      position: absolute;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent), 0 0 3px #fff;
      animation: blip-pulse 5s ease-out infinite;
      opacity: 0;
    }

    /* ─── Card ─── */
    .card {
      position: relative;
      z-index: 5;
      background: rgba(13, 21, 37, 0.88);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 2.25rem 2.25rem 2rem;
      width: 100%;
      max-width: 460px;
      box-shadow:
        0 0 0 1px var(--border-soft),
        0 25px 60px rgba(0, 0, 0, 0.55),
        inset 0 1px 0 rgba(0, 212, 255, 0.06);
    }

    /* Corner decorations */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      border-color: var(--accent);
      border-style: solid;
      opacity: 0.5;
    }
    .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    .card-tag {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--accent);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
      opacity: 0.8;
    }

    .card-title {
      font-family: var(--mono);
      font-size: 2.1rem;
      font-weight: 400;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 0.45rem;
      letter-spacing: -0.01em;
    }

    .card-title .accent { color: var(--accent); }

    .card-sub {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 1.9rem;
      line-height: 1.55;
    }

    /* ─── Form ─── */
    .field {
      margin-bottom: 1.15rem;
    }

    .field label {
      display: block;
      font-family: var(--mono);
      font-size: 0.67rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.35rem;
    }

    .field input {
      width: 100%;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 0.6rem 0.85rem;
      font-family: var(--mono);
      font-size: 0.88rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
      appearance: textfield;
      -moz-appearance: textfield;
    }

    .field input::-webkit-inner-spin-button,
    .field input::-webkit-outer-spin-button { -webkit-appearance: none; }

    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .field input::placeholder { color: var(--muted); }

    .port-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 0.5rem;
      align-items: center;
    }

    .port-arrow {
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--muted);
      text-align: center;
    }

    /* ─── Scan mode pills ─── */
    .mode-label {
      font-family: var(--mono);
      font-size: 0.67rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.35rem;
    }

    .modes {
      display: flex;
      gap: 0.45rem;
      margin-bottom: 1.6rem;
    }

    .mode-btn {
      flex: 1;
      padding: 0.48rem 0;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 2px;
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .mode-btn:hover {
      border-color: rgba(0, 212, 255, 0.3);
      color: var(--text);
    }

    .mode-btn.active {
      background: var(--accent-glow);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ─── Scan button ─── */
    .btn-scan {
      width: 100%;
      padding: 0.8rem 1rem;
      background: var(--accent);
      border: none;
      border-radius: 2px;
      font-family: var(--mono);
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #000d1a;
      cursor: pointer;
      transition: opacity 0.15s, box-shadow 0.2s;
      font-weight: 600;
    }

    .btn-scan:hover {
      opacity: 0.92;
      box-shadow: 0 0 24px rgba(0, 212, 255, 0.35);
    }

    .btn-scan:active { opacity: 0.8; }

    /* ─── Status strip ─── */
    .status-strip {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border-soft);
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #2dff8a;
      box-shadow: 0 0 5px #2dff8a;
      flex-shrink: 0;
    }

    .status-text {
      font-family: var(--mono);
      font-size: 0.66rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    /* ─── Footer ─── */
    footer {
      padding: 1.1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--border-soft);
      position: relative;
      z-index: 10;
    }

    .footer-left {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    .footer-links {
      display: flex;
      gap: 1.25rem;
      list-style: none;
    }

    .footer-links a {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.06em;
      transition: color 0.15s;
    }

    .footer-links a:hover { color: var(--accent); }

    /* ─── Keyframes ─── */
    @keyframes sweep-rotate {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to   { transform: translate(-50%, -50%) rotate(360deg); }
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }

    @keyframes blip-pulse {
      0%   { opacity: 0;   transform: scale(0.5); }
      20%  { opacity: 1;   transform: scale(2); }
      50%  { opacity: 0.5; transform: scale(1); }
      100% { opacity: 0;   transform: scale(0.8); }
    }

    /* ─── Reduced motion ─── */
    @media (prefers-reduced-motion: reduce) {
      .sweep, .nav-pulse, .blip { animation: none !important; }
    }

    /* ─── Mobile ─── */
    @media (max-width: 520px) {
      nav { padding: 1rem; }
      .nav-links { gap: 1rem; }
      main { padding: 1.5rem 1rem 2rem; align-items: start; }
      footer { flex-direction: column; gap: 0.6rem; text-align: center; padding: 1rem; }
      .card { padding: 1.75rem 1.25rem; }
      .radar { width: 300px; height: 300px; opacity: 0.2; }
      .ring:nth-child(1) { width: 60px; height: 60px; }
      .ring:nth-child(2) { width: 120px; height: 120px; }
      .ring:nth-child(3) { width: 185px; height: 185px; }
      .ring:nth-child(4) { width: 250px; height: 250px; }
      .ring:nth-child(5) { width: 300px; height: 300px; }
      .cross-h { width: 300px; }
      .cross-v { height: 300px; }
      .sweep { width: 300px; height: 300px; }
    }
  </style>
</head>
<body>

  <!-- ─── Navigation ─── -->
  <nav>
    <a class="nav-logo" href="#">
      <span class="nav-pulse"></span>
      PORT_SCAN
    </a>
    <ul class="nav-links">
      <li><a href="#">Docs</a></li>
      <li><a href="#">GitHub</a></li>
      <li><a href="#">About</a></li>
    </ul>
  </nav>

  <!-- ─── Main ─── -->
  <main>

    <!-- Radar background -->
    <div class="radar-bg" aria-hidden="true">
      <div class="radar">
        <!-- Rings -->
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <!-- Crosshairs -->
        <div class="cross-h"></div>
        <div class="cross-v"></div>
        <!-- Sweep -->
        <div class="sweep"></div>
        <!-- Center -->
        <div class="radar-center"></div>
        <!-- Blip dots at various positions relative to center (290px = 50% of 580px) -->
        <div class="blip" style="top: 208px; left: 362px; animation-delay: 0.6s;"></div>
        <div class="blip" style="top: 318px; left: 172px; animation-delay: 2.1s;"></div>
        <div class="blip" style="top: 422px; left: 344px; animation-delay: 1.0s;"></div>
        <div class="blip" style="top: 162px; left: 218px; animation-delay: 3.4s;"></div>
        <div class="blip" style="top: 310px; left: 448px; animation-delay: 0.3s;"></div>
        <div class="blip" style="top: 388px; left: 200px; animation-delay: 4.0s;"></div>
      </div>
    </div>

    <!-- ─── Form card ─── -->
    <div class="card">
      <p class="card-tag">v1.0 &nbsp;—&nbsp; Open Source</p>
      <h1 class="card-title">Port<span class="accent">.</span>Scan</h1>
      <p class="card-sub">Discover open ports and services on any host or IP address.</p>

      <!-- Replace action="/scan" with your Flask route -->
      <form action="/scan" method="POST">

        <div class="field">
          <label for="target">Target host</label>
          <input
            type="text"
            id="target"
            name="target"
            placeholder="192.168.1.1 or example.com"
            autocomplete="off"
            spellcheck="false"
            required
          />
        </div>

        <div class="field">
          <label>Port range</label>
          <div class="port-row">
            <input
              type="number"
              name="port_start"
              placeholder="1"
              min="1"
              max="65535"
              value="1"
              required
            />
            <span class="port-arrow">→</span>
            <input
              type="number"
              name="port_end"
              placeholder="1024"
              min="1"
              max="65535"
              value="1024"
              required
            />
          </div>
        </div>

        <div class="mode-label">Scan mode</div>
        <div class="modes">
          <button type="button" class="mode-btn active" data-mode="tcp">TCP</button>
          <button type="button" class="mode-btn" data-mode="udp">UDP</button>
          <button type="button" class="mode-btn" data-mode="full">Full</button>
        </div>
        <!-- Hidden input so Flask knows the selected mode -->
        <input type="hidden" name="scan_mode" id="scan-mode-val" value="tcp" />

        <button type="submit" class="btn-scan">Initiate Scan</button>

        <div class="status-strip">
          <span class="status-dot"></span>
          <span class="status-text">Ready — running locally on your machine</span>
        </div>

      </form>
    </div>

  </main>

  <!-- ─── Footer ─── -->
  <footer>
    <span class="footer-left">Built with Flask &amp; Python</span>
    <ul class="footer-links">
      <li><a href="#">MIT License</a></li>
      <li><a href="#">Source Code</a></li>
      <li><a href="#">Report Bug</a></li>
    </ul>
  </footer>

  <script>
    // Scan mode toggle
    const modeBtns = document.querySelectorAll('.mode-btn');
    const modeInput = document.getElementById('scan-mode-val');

    modeBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        modeBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        modeInput.value = btn.dataset.mode;
      });
    });
  </script>

</body>
</html>
